<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja V22 - Direto ao Ponto</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; padding: 15px; }
        .header { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #f1c40f; text-align: center; margin-bottom: 20px; }
        .btn-arquivo { width: 100%; padding: 15px; background: #222; color: #f1c40f; border: 1px dashed #f1c40f; border-radius: 10px; cursor: pointer; }
        .item-entrega { 
            display: flex; align-items: center; background: #1a1a1a; 
            margin-bottom: 10px; padding: 18px; border-radius: 12px; 
            border-left: 6px solid #f1c40f; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .info { flex: 1; margin-right: 10px; }
        .stop-num { font-size: 22px; font-weight: bold; color: #f1c40f; margin-right: 15px; min-width: 30px; }
        .btn-navegar { 
            background: #f1c40f; color: #000; border: none; padding: 15px 20px; 
            border-radius: 10px; font-weight: bold; text-decoration: none; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        #status { text-align: center; color: #888; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0 0 10px 0; color:#f1c40f;">ROTAS NINJA V22</h2>
    <input type="file" id="fileInput" class="btn-arquivo">
</div>

<div id="status">Aguardando planilha...</div>
<div id="listaEntregas"></div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const wb = XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
            const dados = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            // Ordena pelos Stops da planilha
            dados.sort((a, b) => (a.Stop || 0) - (b.Stop || 0));
            
            const container = document.getElementById('listaEntregas');
            container.innerHTML = "";
            
            dados.forEach((item) => {
                const enderecoRaw = item["Destination Address"] || item["Endereco"] || "";
                if (!enderecoRaw) return;

                // Limpeza para garantir que o Google ache o número em São Caetano
                const destinoLimpo = encodeURIComponent(enderecoRaw.split('-')[0].split('(')[0].trim() + ", São Caetano do Sul, SP");
                
                // LINK MESTRE: origin=My+Location força o GPS do celular. travelmode=driving força carro.
                const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${destinoLimpo}&travelmode=driving`;

                const div = document.createElement('div');
                div.className = 'item-entrega';
                div.innerHTML = `
                    <div class="stop-num">${item.Stop || '?'}</div>
                    <div class="info">
                        <div style="font-weight:bold; font-size:16px;">${enderecoRaw.split(',')[0]}</div>
                        <div style="font-size:12px; color:#f1c40f;">${item.CEP || ''}</div>
                    </div>
                    <a href="${googleMapsUrl}" class="btn-navegar">INICIAR ROTA</a>
                `;
                container.appendChild(div);
            });
            document.getElementById('status').innerText = dados.length + " entregas prontas para navegação.";
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });
</script>

</body>
</html>
