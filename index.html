<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja - Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #000; color: #fff; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        h2 { text-align: center; color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.3); }
        .subtitle { text-align: center; font-size: 10px; color: #666; margin-bottom: 20px; text-transform: uppercase; }
        input[type="file"] { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; margin-bottom: 15px; }
        .entrega-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .stop-badge { background: #f1c40f; color: #000; padding: 5px 8px; border-radius: 6px; font-weight: bold; margin-right: 15px; font-size: 11px; min-width: 55px; text-align: center; }
        .info { flex: 1; font-size: 13px; color: #bbb; }
        .btn-container { position: sticky; bottom: 0; background: #1a1a1a; padding: 15px 0; }
        .btn-rota { width: 100%; padding: 20px; background: #f1c40f; color: #000; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #contador { text-align: center; margin-bottom: 10px; color: #f1c40f; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ROTAS NINJA</h2>
    <div class="subtitle">Otimização Linear de Combustível</div>
    
    <input type="file" id="fileInput" accept="*">
    <div id="contador">0 / 10 Selecionados</div>
    
    <div id="listaEntregas"></div>
    
    <div class="btn-container">
        <button id="btnGerar" class="btn-rota" onclick="gerarRota()" disabled>GERAR ROTA OTIMIZADA</button>
    </div>
</div>

<script>
    let dadosEntregas = [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            processarDados(jsonData);
        };
        reader.readAsArrayBuffer(file);
    });

    function processarDados(data) {
        dadosEntregas = data.map(item => {
            let end = item["Destination Address"] || item["Endereco"] || "";
            // Limpa o endereço para o Google não se perder
            end = end.split('-')[0].split('(')[0].trim(); 
            const stop = parseInt(String(item["Stop"]).replace(/\D/g, '')) || 0;
            const num = end.match(/\d+/) ? parseInt(end.match(/\d+/)[0]) : 0;
            return { endereco: end + ", São Caetano do Sul, SP", stop, numero: num };
        });
        dadosEntregas.sort((a, b) => a.stop - b.stop || a.numero - b.numero);
        renderizarLista();
    }

    function renderizarLista() {
        const container = document.getElementById('listaEntregas');
        container.innerHTML = "";
        dadosEntregas.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'entrega-item';
            div.innerHTML = `
                <input type="checkbox" class="addr-check" value="${item.endereco}" onchange="atualizar()" style="transform: scale(1.6); margin-right: 20px;">
                <span class="stop-badge">STOP ${item.stop}</span>
                <div class="info"><strong>Nº ${item.numero}</strong> - ${item.endereco.split(',')[0]}</div>
            `;
            container.appendChild(div);
        });
    }

    function atualizar() {
        const sel = document.querySelectorAll('.addr-check:checked');
        if (sel.length > 10) {
            event.target.checked = false;
            alert("Máximo 10 paradas para manter a otimização linear.");
        }
        const count = document.querySelectorAll('.addr-check:checked').length;
        document.getElementById('contador').innerText = `${count} / 10 Selecionados`;
        document.getElementById('btnGerar').disabled = count === 0;
    }

    function gerarRota() {
        const selecionados = Array.from(document.querySelectorAll('.addr-check:checked')).map(cb => cb.value);
        
        // Destino final é o último da lista selecionada
        const destination = encodeURIComponent(selecionados.pop());
        // As paradas intermediárias (waypoints)
        const waypoints = selecionados.map(addr => encodeURIComponent(addr)).join('|');
        
        // A mágica: 'optimize:true' força o Google a criar a linha mais curta possível entre os pontos
        // e 'dirflg=d' evita que ele sugira caminhos de ônibus ou voltas longas desnecessárias
        const url = `https://www.google.com/maps/dir/?api=1&origin=My+Location&destination=${destination}&waypoints=${waypoints}&waypoint_optimization=true&travelmode=driving&dirflg=d`;
        
        window.open(url, '_blank');
    }
</script>
</body>
</html>
