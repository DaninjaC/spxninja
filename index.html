<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja V22 - Definitivo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid #f1c40f; text-align: center; }
        .btn-arquivo { background: #222; color: #f1c40f; border: 1px dashed #f1c40f; padding: 10px; border-radius: 5px; width: 90%; max-width: 300px; margin-top: 10px; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #lista-container { width: 350px; overflow-y: auto; padding: 10px; background: #111; z-index: 10; }
        #map-container { flex: 1; position: relative; background: #222; }
        #map { height: 100%; width: 100%; }

        .item-entrega { 
            background: #1a1a1a; margin-bottom: 10px; padding: 15px; border-radius: 8px; 
            border-left: 4px solid #f1c40f; cursor: pointer; display: flex; align-items: center;
        }
        .item-entrega.active { background: #f1c40f; color: #000; font-weight: bold; }
        .stop-num { font-size: 20px; color: #f1c40f; margin-right: 15px; font-weight: bold; }
        .active .stop-num { color: #000; }
        
        #status { font-size: 13px; color: #aaa; margin-bottom: 15px; text-align: center; }

        .leaflet-routing-container { background-color: #222 !important; color: #fff !important; }
        .leaflet-routing-alt h2, .leaflet-routing-alt h3 { color: #f1c40f; }

        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #lista-container { width: 100%; height: 40%; border-bottom: 2px solid #f1c40f; }
            #map-container { height: 60%; }
        }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:#f1c40f;">ROTAS NINJA V22</h3>
    <input type="file" id="fileInput" class="btn-arquivo" accept=".xlsx, .xls, .csv">
</div>

<div id="main-container">
    <div id="lista-container">
        <div id="status">Carregue sua planilha...</div>
        <div id="listaEntregas"></div>
    </div>
    <div id="map-container">
        <div id="map"></div>
    </div>
</div>

<script>
    let map, routingControl;

    map = L.map('map').setView([-23.617, -46.551], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    // FUNÇÃO NINJA: Limpa a sujeira do endereço para o mapa gratuito não bugar
    function inteligenciarEndereco(enderecoBruto) {
        // Separa por vírgula. Pega só a Rua (parte 1) e o Número (parte 2)
        let partes = enderecoBruto.split(',');
        let rua = partes[0] ? partes[0].trim() : '';
        let numero = partes[1] ? partes[1].trim().replace(/\D/g, '') : ''; // Pega só os números da segunda parte, ignora letras

        // Traduz abreviações que o mapa gratuito não entende
        rua = rua.replace(/\bMte\b/gi, 'Monte');
        rua = rua.replace(/\bCel\b/gi, 'Coronel');
        rua = rua.replace(/\bDr\b/gi, 'Doutor');
        rua = rua.replace(/\bProf\b/gi, 'Professor');
        rua = rua.replace(/\bAv\b/gi, 'Avenida');

        // Retorna só o essencial: "Rua Monte Alegre, 65" (Ignora "Ap 31")
        return `${rua}, ${numero}`.trim();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const dados = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            dados.sort((a, b) => (Number(a.Stop) || 0) - (Number(b.Stop) || 0));
            const container = document.getElementById('listaEntregas');
            container.innerHTML = "";
            
            dados.forEach((item) => {
                const enderecoRaw = item["Destination Address"] || item["Endereco"] || item["Endereço"] || "";
                if (!enderecoRaw) return;

                const enderecoLimpoParaBusca = inteligenciarEndereco(enderecoRaw);
                
                const div = document.createElement('div');
                div.className = 'item-entrega';
                div.innerHTML = `
                    <div class="stop-num">${item.Stop || '?'}</div>
                    <div style="font-size: 14px;">${enderecoRaw} <br><small style="color:#aaa;">(Busca: ${enderecoLimpoParaBusca})</small></div>
                `;
                
                div.onclick = () => buscarRota(enderecoLimpoParaBusca, div);
                container.appendChild(div);
            });
            document.getElementById('status').innerText = `${dados.length} entregas carregadas.`;
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function buscarRota(destinoLimpo, elementoClicado) {
        document.querySelectorAll('.item-entrega').forEach(el => el.classList.remove('active'));
        elementoClicado.classList.add('active');
        document.getElementById('status').innerText = "Traçando rota...";

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(position => {
                const latOrigem = position.coords.latitude;
                const lngOrigem = position.coords.longitude;

                const buscaUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destinoLimpo + ", São Caetano do Sul, SP")}&limit=1`;
                
                fetch(buscaUrl)
                    .then(response => response.json())
                    .then(data => {
                        if (data.length > 0) {
                            if (routingControl) { map.removeControl(routingControl); }
                            
                            routingControl = L.Routing.control({
                                waypoints: [
                                    L.latLng(latOrigem, lngOrigem),
                                    L.latLng(data[0].lat, data[0].lon)
                                ],
                                routeWhileDragging: false,
                                language: 'pt',
                                showAlternatives: false,
                                fitSelectedRoutes: true,
                                router: L.Routing.osrmv1({ language: 'pt', profile: 'driving' })
                            }).addTo(map);

                            document.getElementById('status').innerText = "Rota pronta!";
                        } else {
                            alert("Endereço muito complexo na planilha. Tente editar a planilha deixando apenas RUA e NÚMERO.");
                        }
                    });
            });
        }
    }
</script>

</body>
</html>
