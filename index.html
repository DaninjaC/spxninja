<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja V22 - Painel Híbrido</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid #f1c40f; text-align: center; }
        .btn-arquivo { background: #222; color: #f1c40f; border: 1px dashed #f1c40f; padding: 10px; border-radius: 5px; width: 90%; max-width: 300px; margin-top: 10px; cursor: pointer; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #lista-container { width: 350px; overflow-y: auto; padding: 10px; background: #111; z-index: 10; border-right: 1px solid #333; }
        
        #map-container { flex: 1; background: #222; display: flex; flex-direction: column; }
        #googleFrame { width: 100%; flex: 1; border: none; display: none; }
        
        /* Botão para iniciar o GPS nativo caso você queira a rota guiada */
        #btn-iniciar-gps {
            display: none;
            background: #27ae60;
            color: #fff;
            text-align: center;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-top: 2px solid #2ecc71;
        }
        #btn-iniciar-gps:active { background: #2ecc71; }

        .item-entrega { 
            background: #1a1a1a; margin-bottom: 10px; padding: 15px; border-radius: 8px; 
            border-left: 4px solid #f1c40f; cursor: pointer; display: flex; align-items: center;
        }
        .item-entrega.active { background: #f1c40f; color: #000; font-weight: bold; }
        .stop-num { font-size: 20px; color: #f1c40f; margin-right: 15px; font-weight: bold; }
        .active .stop-num { color: #000; }
        
        #status { font-size: 13px; color: #aaa; margin-bottom: 15px; text-align: center; }
        #loading-msg { color: #f1c40f; font-weight: bold; display: none; text-align: center; padding: 20px; margin-top: 50px;}

        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #lista-container { width: 100%; height: 35%; border-bottom: 2px solid #f1c40f; border-right: none; }
            #map-container { height: 65%; }
        }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:#f1c40f;">ROTAS NINJA V22</h3>
    <input type="file" id="fileInput" class="btn-arquivo" accept=".xlsx, .xls, .csv">
</div>

<div id="main-container">
    <div id="lista-container">
        <div id="status">Carregue sua planilha...</div>
        <div id="listaEntregas"></div>
    </div>
    <div id="map-container">
        <div id="loading-msg">Traçando rota exata no Google...</div>
        <iframe id="googleFrame" allowfullscreen></iframe>
        <a href="#" id="btn-iniciar-gps" target="_blank">🚀 INICIAR NAVEGAÇÃO 3D (GPS)</a>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const dados = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            dados.sort((a, b) => (Number(a.Stop) || 0) - (Number(b.Stop) || 0));
            const container = document.getElementById('listaEntregas');
            container.innerHTML = "";
            
            dados.forEach((item) => {
                const enderecoRaw = item["Destination Address"] || item["Endereco"] || item["Endereço"] || "";
                if (!enderecoRaw) return;

                const div = document.createElement('div');
                div.className = 'item-entrega';
                div.innerHTML = `
                    <div class="stop-num">${item.Stop || '?'}</div>
                    <div style="font-size: 14px;">${enderecoRaw}</div>
                `;
                
                div.onclick = () => iniciarRotaGoogle(enderecoRaw, div);
                container.appendChild(div);
            });
            document.getElementById('status').innerText = `${dados.length} entregas prontas!`;
        };
        reader.readAsArrayBuffer(file);
    });

    function iniciarRotaGoogle(destino, elementoClicado) {
        document.querySelectorAll('.item-entrega').forEach(el => el.classList.remove('active'));
        elementoClicado.classList.add('active');
        
        const frame = document.getElementById('googleFrame');
        const loading = document.getElementById('loading-msg');
        const btnGps = document.getElementById('btn-iniciar-gps');
        
        frame.style.display = 'none';
        btnGps.style.display = 'none';
        loading.style.display = 'block';

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(position => {
                const latOrigem = position.coords.latitude;
                const lngOrigem = position.coords.longitude;

                const destinoFormatado = `${destino}, São Caetano do Sul, SP`;
                
                // URL do Frame (Interno)
                const urlFrame = `https://maps.google.com/maps?saddr=${latOrigem},${lngOrigem}&daddr=${encodeURIComponent(destinoFormatado)}&hl=pt-BR&output=embed`;
                
                // URL do Botão de Navegação (Abre o App Nativo)
                // travelmode=driving garante que abra a rota de carro já pronta para iniciar
                const urlNativa = `https://www.google.com/maps/dir/?api=1&origin=${latOrigem},${lngOrigem}&destination=${encodeURIComponent(destinoFormatado)}&travelmode=driving`;

                frame.src = urlFrame;
                btnGps.href = urlNativa;
                
                setTimeout(() => {
                    loading.style.display = 'none';
                    frame.style.display = 'block';
                    // Opcional: Se quiser que o botão verde de abrir o GPS nativo apareça, mantenha a linha abaixo.
                    btnGps.style.display = 'block'; 
                }, 1000);

            }, error => {
                alert("Ative o GPS (Localização) do seu navegador para calcular a rota.");
                loading.style.display = 'none';
            });
        } else {
            alert("Seu navegador não suporta GPS.");
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
