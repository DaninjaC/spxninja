<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPX Ninja - Mapa V2</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #painel-topo { background: #007AFF; padding: 10px; min-height: 140px; display: flex; flex-direction: column; justify-content: center; z-index: 1001; }
        .chegando { background: #FFCC00 !important; color: #000 !important; }
        
        #stop-badge { background: #000; color: #39FF14; padding: 3px 10px; border-radius: 8px; font-weight: bold; font-size: 18px; margin-bottom: 5px; display: inline-block; border: 1px solid #39FF14; }
        #seta-instrucao { font-size: 60px; line-height: 1; display: block; }
        #distancia-curva { font-size: 40px; font-weight: bold; display: block; }

        /* Mapa com altura garantida */
        #map { flex: 1; width: 100%; background: #111; z-index: 1; }

        #info-final { background: #111; padding: 10px; min-height: 100px; display: flex; flex-direction: column; justify-content: center; z-index: 1001; }
        #rua-atual { color: #39FF14; font-weight: bold; font-size: 16px; margin-bottom: 5px; text-transform: uppercase; }
        #distancia-final { font-size: 30px; font-weight: bold; }

        #controles { padding: 15px; background: #000; z-index: 1001; }
        .btn { background: #39FF14; color: #000; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; display: block; }
        input[type="file"] { display: none; }

        /* Filtro Dark Mode mais suave para o mapa */
        .leaflet-tile-container { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

    <div id="painel-topo">
        <div><div id="stop-badge">STOP --</div></div>
        <span id="seta-instrucao">---</span>
        <span id="distancia-curva">0 m</span>
    </div>

    <div id="map"></div>

    <div id="info-final">
        <div id="rua-atual">AGUARDANDO PLANILHA</div>
        <div id="distancia-final">---</div>
    </div>

    <div id="controles">
        <label class="btn" id="btnLabel">🚀 INICIAR GPS COM MAPA<input type="file" id="fileInput" accept=".xlsx, .xls"></label>
    </div>

    <script>
        let rotaSpx = [], passosNavegacao = [], idxDestino = 0, idxPasso = 0;
        let minhaLat, minhaLon, mapa, markerUser, markerDest, polylineRota;

        // Inicialização Garantida
        window.onload = function() {
            mapa = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.61, -46.57], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            
            // Força o mapa a entender o tamanho da tela após 500ms
            setTimeout(() => { mapa.invalidateSize(); }, 500);
        };

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const contagem = {};
                json.forEach(i => { if(i.Stop && !isNaN(i.Stop)) contagem[i.Stop] = (contagem[i.Stop] || 0) + 1; });
                
                const paradasVistas = new Set();
                rotaSpx = json.filter(i => i.Stop && !isNaN(i.Stop))
                    .sort((a, b) => a.Stop - b.Stop)
                    .filter(i => {
                        if (paradasVistas.has(i.Stop)) return false;
                        paradasVistas.add(i.Stop);
                        return true;
                    })
                    .map(i => ({
                        lat: parseFloat(i.Latitude),
                        lon: parseFloat(i.Longitude),
                        addr: i["Destination Address"],
                        stop: i.Stop,
                        pacotes: contagem[i.Stop]
                    }));

                if (rotaSpx.length > 0) {
                    document.getElementById('btnLabel').style.display = 'none';
                    iniciarGPS();
                }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function iniciarGPS() {
            navigator.geolocation.watchPosition(async pos => {
                minhaLat = pos.coords.latitude;
                minhaLon = pos.coords.longitude;
                
                if (!markerUser) {
                    markerUser = L.circleMarker([minhaLat, minhaLon], { color: '#007AFF', fillOpacity: 1, radius: 8 }).addTo(mapa);
                } else {
                    markerUser.setLatLng([minhaLat, minhaLon]);
                }
                mapa.panTo([minhaLat, minhaLon]);

                if (idxDestino < rotaSpx.length) {
                    if (passosNavegacao.length === 0) await calcularRota();
                    navegar();
                }
            }, null, { enableHighAccuracy: true });
        }

        async function calcularRota() {
            const d = rotaSpx[idxDestino];
            document.getElementById('stop-badge').innerText = "STOP " + d.stop + " (" + d.pacotes + " vol)";
            
            if (markerDest) mapa.removeLayer(markerDest);
            markerDest = L.marker([d.lat, d.lon]).addTo(mapa);

            const url = `https://router.project-osrm.org/route/v1/driving/${minhaLon},${minhaLat};${d.lon},${d.lat}?steps=true&overview=full&geometries=geojson`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.routes && data.routes[0]) {
                const route = data.routes[0];
                passosNavegacao = route.legs[0].steps.map(s => ({
                    lat: s.maneuver.location[1], lon: s.maneuver.location[0],
                    manobra: s.maneuver.modifier, tipo: s.maneuver.type, rua: s.name || "Siga em frente"
                }));
                idxPasso = 0;

                if (polylineRota) mapa.removeLayer(polylineRota);
                const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
                polylineRota = L.polyline(coords, { color: '#007AFF', weight: 6, opacity: 0.8 }).addTo(mapa);
                
                // Faz o mapa mostrar você e o destino de uma vez ao carregar a rota
                mapa.fitBounds(polylineRota.getBounds(), { padding: [50, 50] });
            }
        }

        function navegar() {
            if (!rotaSpx[idxDestino] || !passosNavegacao[idxPasso]) return;
            const passo = passosNavegacao[idxPasso];
            const dCurva = dist(minhaLat, minhaLon, passo.lat, passo.lon);
            const dFinal = dist(minhaLat, minhaLon, rotaSpx[idxDestino].lat, rotaSpx[idxDestino].lon);

            document.getElementById('distancia-curva').innerText = Math.round(dCurva) + " m";
            document.getElementById('distancia-final').innerText = dFinal > 1000 ? (dFinal/1000).toFixed(1) + " km" : Math.round(dFinal) + " m";
            document.getElementById('rua-atual').innerText = passo.rua;

            if (dFinal <= 100) document.getElementById('painel-topo').classList.add('chegando');
            else document.getElementById('painel-topo').classList.remove('chegando');

            const m = passo.manobra;
            if (m && m.includes("left")) document.getElementById('seta-instrucao').innerText = "⬅️";
            else if (m && m.includes("right")) document.getElementById('seta-instrucao').innerText = "➡️";
            else if (passo.tipo === "arrive") document.getElementById('seta-instrucao').innerText = "📍";
            else document.getElementById('seta-instrucao').innerText = "⬆️";

            if (dCurva < 20 && idxPasso < passosNavegacao.length - 1) idxPasso++;
            if (dFinal < 70) {
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                idxDestino++; passosNavegacao = []; calcularRota();
            }
        }

        function dist(la1, lo1, la2, lo2) {
            const R = 6371000;
            const dLat = (la2-la1) * Math.PI/180;
            const dLon = (lo2-lo1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
    </script>
</body>
</html>
