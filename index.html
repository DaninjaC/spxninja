<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPX Ninja - v13 Navegação Estável</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon: #39FF14; --blue: #007AFF; --yellow: #FFCC00; --red: #FF0000; --bg: #000; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #painel-topo { background: var(--blue); display: grid; grid-template-columns: 110px 1fr 90px; align-items: center; height: 130px; z-index: 1001; transition: background 0.3s; }
        .modo-confirmacao { background: var(--yellow) !important; color: #000 !important; }
        
        #col-seta { text-align: center; border-right: 1px solid rgba(255,255,255,0.2); }
        #seta-instrucao { font-size: 70px; line-height: 1; display: block; }
        #metros-curva { font-size: 24px; font-weight: bold; }

        #col-info { padding-left: 10px; text-align: left; }
        #stop-badge { background: #000; color: var(--neon); padding: 4px 10px; border-radius: 5px; font-weight: bold; font-size: 16px; border: 1px solid var(--neon); margin-bottom: 5px; display: inline-block; }
        #rua-topo { font-size: 16px; font-weight: bold; text-transform: uppercase; display: block; line-height: 1.2; }

        #col-km { text-align: center; font-size: 11px; }
        #km-restante { font-size: 18px; font-weight: bold; color: var(--neon); display: block; }

        /* BOX DO MAPA COM OFFSET PARA VOCÊ FICAR EMBAIXO */
        #map-box { flex: 1; position: relative; background: #111; overflow: hidden; }
        #map { 
            width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center 75%; /* Gira em torno de onde você está (embaixo) */
        }

        #painel-rodape { background: #111; display: grid; grid-template-columns: 1fr 1fr; height: 170px; border-top: 2px solid #333; z-index: 1001; }
        .col-log { padding: 10px; overflow-y: auto; font-size: 13px; text-align: left; }
        .col-log:first-child { border-right: 1px solid #222; }
        
        .label-rodape { font-size: 10px; color: #777; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .linha-pacote { margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        b { color: var(--neon); }

        #safe-area { height: 40px; background: #000; }

        #init-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .btn-load { background: var(--neon); color: #000; padding: 20px 40px; border-radius: 15px; font-weight: bold; font-size: 22px; cursor: pointer; }

        #modal-stops { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 20px; }
        #lista-selecao { flex: 1; overflow-y: auto; margin-top: 20px; }
        .item-stop { padding: 18px; border-bottom: 1px solid #333; color: #fff; font-size: 18px; }

        #painel-acoes { display: none; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: var(--yellow); position: absolute; bottom: 170px; width: 100%; box-sizing: border-box; z-index: 2000; }
        .btn-status { padding: 20px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; color: #fff; text-transform: uppercase; }

        .leaflet-tile-container { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        /* QUADRADO DO STOP - COM CONTRA-ROTAÇÃO */
        .stop-marker-ui {
            background: #000; color: #fff; border: 2px solid var(--neon); border-radius: 8px;
            font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center;
            width: 45px !important; height: 45px !important; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.5s linear; /* Para o número girar junto e ficar reto */
        }
        .stop-marker-ui.concluido { background: var(--red) !important; border-color: #fff !important; }
        .stop-marker-ui.atual { background: var(--blue) !important; border-color: #fff !important; transform: scale(1.15); z-index: 9999 !important; }
    </style>
</head>
<body>

    <div id="init-layer">
        <h1 style="color:var(--neon); margin-bottom: 30px;">SPX NINJA v13</h1>
        <label class="btn-load" onclick="ativarSom()">
            📂 INICIAR EXPEDIENTE
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display:none">
        </label>
    </div>

    <div id="modal-stops">
        <h3 style="color:var(--neon)">Em qual parada você está?</h3>
        <div id="lista-selecao"></div>
    </div>

    <div id="painel-topo">
        <div id="col-seta">
            <span id="seta-instrucao">⬆️</span>
            <span id="metros-curva">0m</span>
        </div>
        <div id="col-info">
            <div id="stop-badge">STOP --</div>
            <span id="rua-topo">Aguardando GPS...</span>
        </div>
        <div id="col-km">
            KM TOTAL
            <span id="km-restante">0.0</span>
        </div>
    </div>

    <div id="painel-acoes">
        <button class="btn-status" style="background:#28a745" onclick="finalizarParada('concluido')">CONCLUÍDO</button>
        <button class="btn-status" style="background:#555" onclick="finalizarParada('pendente')">PENDENTE</button>
    </div>

    <div id="map-box"><div id="map"></div></div>

    <div id="painel-rodape">
        <div class="col-log">
            <div class="label-rodape">📦 Conferência</div>
            <div id="log-pacotes">---</div>
        </div>
        <div class="col-log">
            <div class="label-rodape">📍 Radar (120m)</div>
            <div id="log-radar">---</div>
        </div>
    </div>

    <div id="safe-area"></div>

    <script>
        let rotaSpx = [], passosNav = [], idxDestino = 0, idxPasso = 0;
        let minhaLat, minhaLon, mapa, markerUser, polylineRota;
        let camadaFundo = L.layerGroup(), aguardandoConf = false, jaFalouVoz = false;
        let ultimaLat, ultimaLon, currentHeading = 0;

        function falar(texto) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(texto);
                msg.lang = 'pt-BR'; msg.rate = 1.1; window.speechSynthesis.speak(msg);
            }
        }
        function ativarSom() { falar("Modo navegação ativa."); }

        window.onload = function() {
            mapa = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.61, -46.57], 19);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            camadaFundo.addTo(mapa);
        };

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const stopsMap = {};
                raw.filter(i => i.Stop || i.Parada).forEach(i => {
                    const sNum = i.Stop || i.Parada;
                    if (!stopsMap[sNum]) {
                        stopsMap[sNum] = {
                            stop: sNum,
                            lat: parseFloat(String(i.Latitude).replace(',', '.')),
                            lon: parseFloat(String(i.Longitude).replace(',', '.')),
                            rua: i["Destination Address"].split(',')[0],
                            ends: []
                        };
                    }
                    stopsMap[sNum].ends.push(i["Destination Address"]);
                });
                rotaSpx = Object.values(stopsMap).sort((a, b) => a.stop - b.stop).map(s => {
                    const contagem = {};
                    s.ends.forEach(e => {
                        const num = e.split(',')[1] ? e.split(',')[1].trim() : "S/N";
                        contagem[num] = (contagem[num] || 0) + 1;
                    });
                    return { ...s, htmlLista: Object.entries(contagem).map(([n, q]) => `<div class="linha-pacote"><b>${q}</b> pac no nº <b>${n}</b></div>`).join(''), status: 'neutro' };
                });
                if (rotaSpx.length > 0) mostrarModal();
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function mostrarModal() {
            const modal = document.getElementById('modal-stops');
            const container = document.getElementById('lista-selecao');
            container.innerHTML = ""; modal.style.display = "flex";
            rotaSpx.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = "item-stop";
                div.innerHTML = `<b>${p.stop}</b> - ${p.rua}`;
                div.onclick = () => { idxDestino = index; modal.style.display = "none"; document.getElementById('init-layer').style.display='none'; desenharMarcadores(); iniciarGPS(); };
                container.appendChild(div);
            });
        }

        function desenharMarcadores() {
            camadaFundo.clearLayers();
            rotaSpx.forEach((p, index) => {
                let cssClass = "stop-marker-ui";
                if (p.status === 'concluido') cssClass += " concluido";
                if (index === idxDestino) cssClass += " atual";

                const icon = L.divIcon({ 
                    className: cssClass, 
                    html: `<div style="transform: rotate(${currentHeading}deg)">${p.stop}</div>`, 
                    iconSize: [45, 45], iconAnchor: [22, 22] 
                });
                p.marker = L.marker([p.lat, p.lon], { icon: icon }).addTo(camadaFundo);
                p.marker.on('click', () => {
                    p.marker.bindPopup(`<div style="text-align:center"><b style="font-size:18px">STOP ${p.stop}</b><hr><button class="popup-btn" style="background:var(--red)" onclick="setStatusManual(${index}, 'concluido')">ENTREGUE</button></div>`).openPopup();
                });
            });
        }

        function setStatusManual(idx, status) {
            rotaSpx[idx].status = status;
            desenharMarcadores(); mapa.closePopup();
            if (idx === idxDestino) finalizarParada(status);
        }

        function iniciarGPS() {
            navigator.geolocation.watchPosition(async pos => {
                let nLat = pos.coords.latitude, nLon = pos.coords.longitude;
                
                // SÓ ATUALIZA ROTAÇÃO SE ANDAR MAIS DE 7 METROS (ESTABILIDADE)
                if (ultimaLat && dist(ultimaLat, ultimaLon, nLat, nLon) > 7) {
                    let targetHeading = calcularHeading(ultimaLat, ultimaLon, nLat, nLon);
                    // Suavização simples de ângulo
                    currentHeading = targetHeading;
                    document.getElementById('map').style.transform = `translateY(25%) rotate(${-currentHeading}deg)`;
                    desenharMarcadores(); // Repinta para desentortar os números
                }

                ultimaLat = minhaLat = nLat; ultimaLon = minhaLon = nLon;

                if (!markerUser) markerUser = L.circleMarker([minhaLat, minhaLon], { color: '#fff', fillColor: '#007AFF', fillOpacity: 1, radius: 10, weight: 3, zIndexOffset: 1000 }).addTo(mapa);
                else markerUser.setLatLng([minhaLat, minhaLon]);

                // CENTRO DESLOCADO: Coloca você no 75% da altura da tela (parte de baixo)
                mapa.setView([minhaLat, minhaLon], 19, { animate: true });
                atualizarRadar();

                if (idxDestino < rotaSpx.length && !aguardandoConf) {
                    if (passosNav.length === 0 || dist(minhaLat, minhaLon, passosNav[idxPasso]?.lat, passosNav[idxPasso]?.lon) > 50) await calcularRota();
                    navegar();
                }
            }, null, { enableHighAccuracy: true });
        }

        async function calcularRota() {
            const d = rotaSpx[idxDestino];
            document.getElementById('stop-badge').innerText = "STOP " + d.stop;
            document.getElementById('rua-topo').innerText = d.rua;
            document.getElementById('log-pacotes').innerHTML = d.htmlLista;
            desenharMarcadores();

            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${minhaLon},${minhaLat};${d.lon},${d.lat}?steps=true&overview=full&geometries=geojson`);
            const data = await res.json();
            if (data.routes && data.routes[0]) {
                const r = data.routes[0];
                passosNav = r.legs[0].steps.filter(s => s.maneuver.type.includes('turn') || s.maneuver.type === 'arrive').map(s => ({ lat: s.maneuver.location[1], lon: s.maneuver.location[0], m: s.maneuver.modifier }));
                idxPasso = 0; jaFalouVoz = false;
                document.getElementById('km-restante').innerText = (r.distance / 1000).toFixed(1) + " km";
                if (polylineRota) mapa.removeLayer(polylineRota);
                polylineRota = L.polyline(r.geometry.coordinates.map(c => [c[1], c[0]]), { color: '#007AFF', weight: 8, opacity: 0.8 }).addTo(mapa);
            }
        }

        function navegar() {
            const dFinal = dist(minhaLat, minhaLon, rotaSpx[idxDestino].lat, rotaSpx[idxDestino].lon);
            if (dFinal < 65) {
                aguardandoConf = true;
                document.getElementById('painel-acoes').style.display = 'grid';
                document.getElementById('painel-topo').classList.add('modo-confirmacao');
                return;
            }
            const p = passosNav[idxPasso]; if (!p) return;
            const dCurva = dist(minhaLat, minhaLon, p.lat, p.lon);
            document.getElementById('metros-curva').innerText = Math.round(dCurva) + "m";
            
            if (dCurva < 18 && !jaFalouVoz) {
                if (p.m && p.m.includes("left")) falar("Vire à esquerda");
                else if (p.m && p.m.includes("right")) falar("Vire à direita");
                jaFalouVoz = true;
            }
            if (p.m && p.m.includes("left")) document.getElementById('seta-instrucao').innerText = "⬅️";
            else if (p.m && p.m.includes("right")) document.getElementById('seta-instrucao').innerText = "➡️";
            else document.getElementById('seta-instrucao').innerText = "⬆️";
            if (dCurva < 20 && idxPasso < passosNav.length - 1) { idxPasso++; jaFalouVoz = false; }
        }

        function finalizarParada(st) {
            rotaSpx[idxDestino].status = st;
            aguardandoConf = false; idxDestino++; passosNav = [];
            document.getElementById('painel-acoes').style.display = 'none';
            document.getElementById('painel-topo').classList.remove('modo-confirmacao');
            desenharMarcadores(); if (idxDestino < rotaSpx.length) calcularRota();
        }

        function atualizarRadar() {
            const proximos = rotaSpx.filter((p, i) => i !== idxDestino && p.status === 'neutro' && dist(minhaLat, minhaLon, p.lat, p.lon) < 120);
            const container = document.getElementById('log-radar');
            if (proximos.length > 0) {
                container.innerHTML = proximos.map(p => `<div><b>STOP ${p.stop}</b> (${Math.round(dist(minhaLat, minhaLon, p.lat, p.lon))}m)</div>`).join('');
            } else { container.innerText = "Nenhum"; }
        }

        function dist(la1, lo1, la2, lo2) {
            const R = 6371000;
            const dLat = (la2-la1) * Math.PI/180, dLon = (lo2-lo1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calcularHeading(la1, lo1, la2, lo2) {
            const y = Math.sin((lo2-lo1)*Math.PI/180)*Math.cos(la2*Math.PI/180);
            const x = Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos((lo2-lo1)*Math.PI/180);
            return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
