<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador Capi Roots</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        input[type="file"] { margin-bottom: 20px; width: 100%; }
        .entrega-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .entrega-item:last-child { border-bottom: none; }
        .stop-badge { background: #007bff; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-right: 10px; }
        .info { flex-grow: 1; font-size: 14px; }
        .btn-rota { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Capi Roots - Roteirizador</h2>
    <p>Selecione a planilha da Shopee (CSV):</p>
    <input type="file" id="csvFile" accept=".csv">
    
    <div id="listaEntregas"></div>
    
    <button class="btn-rota" onclick="gerarRota()">Criar Rota no Maps</button>
</div>

<script>
    let dadosEntregas = [];

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                processarDados(results.data);
            }
        });
    });

    function processarDados(data) {
        // 1. Limpeza e extração do número do endereço para ordenação
        dadosEntregas = data.map(item => {
            // Tenta pegar o número da rua (assume que é o primeiro conjunto de dígitos após o nome da rua)
            const numMatch = item.Endereco ? item.Endereco.match(/\d+/) : [0];
            return {
                ...item,
                numeroParaOrdem: parseInt(numMatch[0]) || 0,
                stop: parseInt(item.Stop) || 999
            };
        });

        // 2. Ordenação: Primeiro por Stop, depois pelo número da casa
        dadosEntregas.sort((a, b) => {
            if (a.stop !== b.stop) return a.stop - b.stop;
            return a.numeroParaOrdem - b.numeroParaOrdem;
        });

        renderizarLista();
    }

    function renderizarLista() {
        const container = document.getElementById('listaEntregas');
        container.innerHTML = "";

        dadosEntregas.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'entrega-item';
            div.innerHTML = `
                <input type="checkbox" id="item-${index}" value="${item.Endereco}" checked>
                <span class="stop-badge">Stop ${item.stop}</span>
                <div class="info">
                    <strong>${item.Nome || 'Cliente'}</strong><br>
                    ${item.Endereco}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function gerarRota() {
        const selecionados = [];
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            selecionados.push(cb.value);
        });

        if (selecionados.length === 0) return alert("Selecione ao menos um endereço!");

        // Google Maps suporta até ~9 paradas + destino no link direto
        const destino = selecionados[selecionados.length - 1];
        const paradas = selecionados.slice(0, -1).join('|');
        
        const url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destino)}&waypoints=${encodeURIComponent(paradas)}&travelmode=driving`;
        
        window.open(url, '_blank');
    }
</script>

</body>
</html>
