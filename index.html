<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPX Ninja - Pro v3</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon-green: #39FF14; --shopee-blue: #007AFF; }
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Painel Superior */
        #painel-topo { background: var(--shopee-blue); padding: 10px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; z-index: 1001; }
        .modo-confirmacao { background: #FFCC00 !important; color: #000 !important; }
        
        #stop-badge { background: #000; color: var(--neon-green); padding: 2px 10px; border-radius: 5px; font-weight: bold; font-size: 16px; border: 1px solid var(--neon-green); margin-bottom: 5px; display: inline-block; }
        #seta-instrucao { font-size: 50px; line-height: 1; display: block; }
        #distancia-curva { font-size: 35px; font-weight: bold; display: block; }

        #painel-acoes { display: none; gap: 10px; padding: 10px; }
        .btn-status { flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; border: none; color: #fff; font-size: 16px; }
        .btn-check { background: #28a745; }
        .btn-fail { background: #dc3545; }

        /* Mapa */
        #map { flex: 1; width: 100%; background: #111; z-index: 1; }

        /* Rodapé com Endereço em Destaque */
        #info-final { background: #111; padding: 15px; border-top: 2px solid #444; z-index: 1001; }
        #rua-texto { color: var(--neon-green); font-weight: bold; font-size: 22px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        #distancia-final { font-size: 28px; font-weight: bold; }

        /* Sidebar / Guia Lateral */
        #sidebar { position: fixed; right: -280px; top: 0; width: 260px; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; transition: 0.3s; padding: 20px; border-left: 2px solid var(--neon-green); overflow-y: auto; }
        #sidebar.open { right: 0; }
        .prox-item { background: #222; padding: 10px; margin-bottom: 10px; border-radius: 5px; border-left: 4px solid var(--shopee-blue); font-size: 13px; cursor: pointer; }
        
        #btn-sidebar { position: fixed; right: 10px; top: 150px; z-index: 1002; background: var(--neon-green); color: #000; width: 50px; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; box-shadow: 0 0 15px var(--neon-green); }

        /* Modal de Início */
        #modal-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #lista-stops-inicio { flex: 1; overflow-y: auto; margin: 20px 0; }
        .item-selecao { padding: 15px; border-bottom: 1px solid #333; font-size: 18px; }

        .leaflet-tile-container { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

    <div id="modal-inicio">
        <h2>Selecione o Stop de Início</h2>
        <div id="lista-stops-inicio"></div>
    </div>

    <div id="btn-sidebar" onclick="toggleSidebar()">📍</div>
    <div id="sidebar">
        <h3 style="color: var(--neon-green)">Sugestões Próximas</h3>
        <div id="lista-proximos"></div>
        <button onclick="toggleSidebar()" style="width:100%; padding:10px; background:#444; color:#fff; border:none; margin-top:10px;">FECHAR</button>
    </div>

    <div id="painel-topo">
        <div><div id="stop-badge">STOP --</div></div>
        <div id="nav-ui">
            <span id="seta-instrucao">---</span>
            <span id="distancia-curva">0 m</span>
        </div>
        <div id="painel-acoes">
            <button class="btn-status btn-check" onclick="finalizarParada('concluido')">CONCLUÍDO</button>
            <button class="btn-status btn-fail" onclick="finalizarParada('pendente')">PENDENTE</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="info-final">
        <span id="rua-texto">CARREGUE A PLANILHA</span>
        <div id="distancia-final">---</div>
    </div>

    <div id="controles" style="padding:15px; background:#000;">
        <label style="background:var(--neon-green); color:#000; padding:18px; border-radius:15px; font-weight:bold; display:block; text-align:center;" id="btnLabel">
            🚀 CARREGAR ROTA
            <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none">
        </label>
    </div>

    <script>
        let rotaSpx = [], passosNavegacao = [], idxDestino = 0, idxPasso = 0;
        let minhaLat, minhaLon, mapa, markerUser, markerDest, polylineRota;
        let camadaFundo = L.layerGroup(), aguardandoConfirmacao = false, wakeLock = null;

        window.onload = function() {
            mapa = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.61, -46.57], 18); // Zoom inicial maior
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            camadaFundo.addTo(mapa);
            setTimeout(() => { mapa.invalidateSize(); }, 500);
        };

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const contagem = {};
                json.forEach(i => { if(i.Stop && !isNaN(i.Stop)) contagem[i.Stop] = (contagem[i.Stop] || 0) + 1; });
                
                const paradasVistas = new Set();
                rotaSpx = json.filter(i => i.Stop && !isNaN(i.Stop))
                    .sort((a, b) => a.Stop - b.Stop)
                    .filter(i => {
                        if (paradasVistas.has(i.Stop)) return false;
                        paradasVistas.add(i.Stop); return true;
                    })
                    .map(i => ({
                        lat: parseFloat(i.Latitude), lon: parseFloat(i.Longitude),
                        addr: i["Destination Address"], stop: i.Stop,
                        pacotes: contagem[i.Stop], status: 'neutro'
                    }));

                // Abre modal de seleção de início
                abrirSelecaoInicio();
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function abrirSelecaoInicio() {
            const modal = document.getElementById('modal-inicio');
            const lista = document.getElementById('modal-inicio');
            const container = document.getElementById('lista-stops-inicio');
            container.innerHTML = "";
            modal.style.display = "flex";

            rotaSpx.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = "item-selecao";
                div.innerText = `STOP ${p.stop} - ${p.addr}`;
                div.onclick = () => {
                    idxDestino = index;
                    modal.style.display = "none";
                    document.getElementById('btnLabel').style.display = 'none';
                    desenharStopsFundo();
                    iniciarGPS();
                    requestWakeLock();
                };
                container.appendChild(div);
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); atualizarSugestoes(); }

        function atualizarSugestoes() {
            const container = document.getElementById('lista-proximos');
            container.innerHTML = "";
            const proximos = rotaSpx.map((p, i) => ({ ...p, index: i, d: dist(minhaLat, minhaLon, p.lat, p.lon) }))
                .filter(p => p.d < 1000 && p.status === 'neutro' && p.index !== idxDestino)
                .sort((a, b) => a.d - b.d);

            proximos.forEach(p => {
                const div = document.createElement('div');
                div.className = "prox-item";
                div.innerHTML = `<b>STOP ${p.stop}</b> (${Math.round(p.d)}m)<br>${p.addr}`;
                div.onclick = () => { 
                    idxDestino = p.index; 
                    passosNavegacao = []; 
                    toggleSidebar(); 
                    calcularRota(); 
                };
                container.appendChild(div);
            });
        }

        function desenharStopsFundo() {
            camadaFundo.clearLayers();
            rotaSpx.forEach((p) => {
                L.circleMarker([p.lat, p.lon], { radius: 8, color: '#666', fillColor: '#333', fillOpacity: 1, weight: 2 })
                .bindTooltip(p.stop.toString(), { permanent: true, direction: 'center', className: 'stop-label' })
                .addTo(camadaFundo);
            });
        }

        function iniciarGPS() {
            navigator.geolocation.watchPosition(async pos => {
                minhaLat = pos.coords.latitude; minhaLon = pos.coords.longitude;
                if (!markerUser) markerUser = L.circleMarker([minhaLat, minhaLon], { color: '#007AFF', fillOpacity: 1, radius: 10 }).addTo(mapa);
                else markerUser.setLatLng([minhaLat, minhaLon]);

                if (idxDestino < rotaSpx.length && !aguardandoConfirmacao) {
                    if (passosNavegacao.length === 0 || dist(minhaLat, minhaLon, ultimaLatReq, ultimaLonReq) > 20) {
                        await calcularRota();
                        ultimaLatReq = minhaLat; ultimaLonReq = minhaLon;
                    }
                    navegar();
                }
                mapa.setView([minhaLat, minhaLon], 19); // Zoom máximo na navegação
            }, null, { enableHighAccuracy: true });
        }

        async function calcularRota() {
            const d = rotaSpx[idxDestino];
            document.getElementById('stop-badge').innerText = `STOP ${d.stop} (${d.pacotes} VOL)`;
            document.getElementById('rua-texto').innerText = d.addr;
            
            if (markerDest) mapa.removeLayer(markerDest);
            markerDest = L.marker([d.lat, d.lon]).addTo(mapa);

            const url = `https://router.project-osrm.org/route/v1/driving/${minhaLon},${minhaLat};${d.lon},${d.lat}?steps=true&overview=full&geometries=geojson`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.routes && data.routes[0]) {
                const route = data.routes[0];
                passosNavegacao = route.legs[0].steps.map(s => ({
                    lat: s.maneuver.location[1], lon: s.maneuver.location[0],
                    manobra: s.maneuver.modifier, rua: s.name || "Siga em frente"
                }));
                idxPasso = 0;
                if (polylineRota) mapa.removeLayer(polylineRota);
                polylineRota = L.polyline(route.geometry.coordinates.map(c => [c[1], c[0]]), { color: '#007AFF', weight: 8, opacity: 0.8 }).addTo(mapa);
            }
        }

        function navegar() {
            const dFinal = dist(minhaLat, minhaLon, rotaSpx[idxDestino].lat, rotaSpx[idxDestino].lon);
            if (dFinal < 70) {
                aguardandoConfirmacao = true;
                if (wakeLock) wakeLock.release();
                document.getElementById('nav-ui').style.display = 'none';
                document.getElementById('painel-acoes').style.display = 'flex';
                document.getElementById('painel-topo').classList.add('modo-confirmacao');
                document.getElementById('rua-texto').innerText = "CHEGOU: " + rotaSpx[idxDestino].addr;
                return;
            }
            const passo = passosNavegacao[idxPasso];
            if (!passo) return;
            const dCurva = dist(minhaLat, minhaLon, passo.lat, passo.lon);
            document.getElementById('distancia-curva').innerText = Math.round(dCurva) + " m";
            document.getElementById('distancia-final').innerText = dFinal > 1000 ? (dFinal/1000).toFixed(1) + " km" : Math.round(dFinal) + " m";
            const m = passo.manobra;
            if (m && m.includes("left")) document.getElementById('seta-instrucao').innerText = "⬅️";
            else if (m && m.includes("right")) document.getElementById('seta-instrucao').innerText = "➡️";
            else document.getElementById('seta-instrucao').innerText = "⬆️";
            if (dCurva < 15 && idxPasso < passosNavegacao.length - 1) idxPasso++;
        }

        function finalizarParada(status) {
            rotaSpx[idxDestino].status = status;
            aguardandoConfirmacao = false;
            requestWakeLock();
            idxDestino++;
            passosNavegacao = [];
            document.getElementById('nav-ui').style.display = 'block';
            document.getElementById('painel-acoes').style.display = 'none';
            document.getElementById('painel-topo').classList.remove('modo-confirmacao');
            if (idxDestino < rotaSpx.length) calcularRota();
        }

        function dist(la1, lo1, la2, lo2) {
            const R = 6371000;
            const dLat = (la2-la1) * Math.PI/180;
            const dLon = (lo2-lo1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
