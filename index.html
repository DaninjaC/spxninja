<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja V7</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 10px; background: #1a1a1a; border-bottom: 2px solid #f1c40f; text-align: center; }
        #status { font-size: 13px; color: #f1c40f; background: #222; padding: 8px; text-align: center; min-height: 20px; }
        #listaEntregas { flex: 1; overflow-y: auto; max-height: 30vh; padding: 10px; background: #111; }
        .entrega-item { display: flex; align-items: center; background: #222; margin-bottom: 5px; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        .stop-badge { background: #f1c40f; color: #000; padding: 3px 7px; border-radius: 4px; font-weight: bold; margin-right: 12px; }
        #map { flex: 2; width: 100%; border-top: 1px solid #444; }
        .footer { padding: 15px; background: #1a1a1a; }
        .btn-acao { width: 100%; padding: 18px; background: #f1c40f; color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="header"><strong>ROTAS NINJA</strong></div>
<div id="status">Selecione o arquivo Excel (.xlsx)</div>
<div id="controls" style="padding: 10px;"><input type="file" id="fileInput"></div>
<div id="listaEntregas"></div>
<div id="map"></div>
<div class="footer"><button class="btn-acao" onclick="iniciarProcesso()">TRAÇAR ROTA AGORA</button></div>

<script>
    // Inicializa Mapa em São Caetano por padrão
    let map = L.map('map').setView([-23.6192, -46.5627], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let markers = [];
    let polyline = null;
    let dadosEntregas = [];
    let minhaPosicao = [-23.6192, -46.5627]; // Padrão SCS caso o GPS demore

    // Monitor de GPS
    navigator.geolocation.getCurrentPosition(pos => {
        minhaPosicao = [pos.coords.latitude, pos.coords.longitude];
        L.circleMarker(minhaPosicao, {color: 'cyan', radius: 10}).addTo(map).bindPopup("Você");
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                const listaDiv = document.getElementById('listaEntregas');
                listaDiv.innerHTML = "";
                dadosEntregas = jsonData.map(item => {
                    let end = (item["Destination Address"] || item["Endereco"] || "").split('-')[0].trim();
                    return { endereco: end + ", São Caetano do Sul, SP", stop: item["Stop"] || "?" };
                });

                dadosEntregas.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'entrega-item';
                    div.innerHTML = `
                        <input type="checkbox" class="addr-check" value="${item.endereco}" style="transform: scale(1.5); margin-right: 15px;">
                        <span class="stop-badge">S${item.stop}</span>
                        <div style="font-size:13px">${item.endereco.split(',')[0]}</div>
                    `;
                    listaDiv.appendChild(div);
                });
                document.getElementById('status').innerText = "Arquivo carregado. Marque as paradas.";
            } catch(err) { alert("Erro ao ler planilha!"); }
        };
        reader.readAsArrayBuffer(file);
    });

    async function iniciarProcesso() {
        const status = document.getElementById('status');
        const checks = Array.from(document.querySelectorAll('.addr-check:checked'));
        
        if (checks.length === 0) {
            alert("Marque pelo menos uma entrega na lista!");
            return;
        }

        status.innerText = "Ninja trabalhando... localizando endereços.";
        
        // Limpa o que já existe no mapa
        markers.forEach(m => map.removeLayer(m));
        if (polyline) map.removeLayer(polyline);
        markers = [];

        let coordenadas = [minhaPosicao];

        for (let i = 0; i < checks.length; i++) {
            status.innerText = `Localizando: ${i+1} de ${checks.length}...`;
            try {
                const query = encodeURIComponent(checks[i].value);
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
                const data = await res.json();
                
                if (data.length > 0) {
                    const pt = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                    coordenadas.push(pt);
                    let m = L.marker(pt).addTo(map).bindPopup(checks[i].value);
                    markers.push(m);
                }
            } catch (e) { console.error("Erro no endereço", i); }
            // Pausa obrigatória para não ser bloqueado pelo servidor do mapa
            await new Promise(r => setTimeout(r, 800));
        }

        status.innerText = "Criando melhor caminho linear...";
        
        // Monta a string de coordenadas para o OSRM
        const coordsStr = coordenadas.map(c => `${c[1]},${c[0]}`).join(';');
        
        try {
            // Usamos a API de 'trip' que otimiza a ordem dos pontos automaticamente
            const osrm = await fetch(`https://router.project-osrm.org/trip/v1/driving/${coordsStr}?source=first&overview=full&geometries=geojson`);
            const route = await osrm.json();

            if (route.trips && route.trips[0]) {
                const line = route.trips[0].geometry.coordinates.map(c => [c[1], c[0]]);
                polyline = L.polyline(line, {color: '#f1c40f', weight: 6}).addTo(map);
                map.fitBounds(polyline.getBounds());
                status.innerText = "ROTA TRAÇADA COM SUCESSO!";
            } else {
                status.innerText = "Erro ao traçar linha. Tente menos paradas.";
            }
        } catch (e) {
            status.innerText = "Erro de conexão com o servidor de rotas.";
        }
    }
</script>
</body>
</html>
