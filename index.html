<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja - SCS</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #121212; color: #eee; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h2 { text-align: center; color: #f1c40f; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 11px; color: #777; margin-bottom: 20px; }
        input[type="file"] { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 15px; }
        .entrega-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #333; }
        .stop-badge { background: #f1c40f; color: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-right: 15px; font-size: 12px; min-width: 60px; text-align: center; }
        .info { flex: 1; font-size: 14px; }
        .btn-container { position: sticky; bottom: 0; background: #1e1e1e; padding: 15px 0; }
        .btn-rota { width: 100%; padding: 20px; background: #f1c40f; color: #000; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.2); }
        #contador { text-align: center; margin-bottom: 10px; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ROTAS NINJA</h2>
    <div class="subtitle">SÃO CAETANO DO SUL - SP</div>
    
    <input type="file" id="fileInput" accept="*">
    <div id="contador">Selecionados: 0 / 10</div>
    
    <div id="listaEntregas"></div>
    
    <div class="btn-container">
        <button id="btnGerar" class="btn-rota" onclick="gerarRota()" disabled>TRAÇAR MELHOR CAMINHO</button>
    </div>
</div>

<script>
    let dadosEntregas = [];
    let selecionadosCount = 0;

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                processarDados(jsonData);
            } catch (err) {
                alert("Erro ao ler arquivo. Baixe para o celular antes de selecionar.");
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function processarDados(data) {
        dadosEntregas = data.map(item => {
            let endereco = item["Destination Address"] || item["Endereco"] || "";
            // Garante que o endereço tenha a cidade e estado para não sair de SCS
            if (!endereco.toLowerCase().includes("são caetano")) {
                endereco += ", São Caetano do Sul, SP";
            }
            
            const stop = parseInt(String(item["Stop"]).replace(/\D/g, '')) || 0;
            const numMatch = endereco.match(/\d+/);
            const numero = numMatch ? parseInt(numMatch[0]) : 0;
            return { endereco, stop, numero };
        });

        // Ordenação Inicial por Stop da Planilha
        dadosEntregas.sort((a, b) => a.stop - b.stop || a.numero - b.numero);

        renderizarLista();
    }

    function renderizarLista() {
        const container = document.getElementById('listaEntregas');
        container.innerHTML = "";
        selecionadosCount = 0;
        atualizarBotao();

        dadosEntregas.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'entrega-item';
            div.innerHTML = `
                <input type="checkbox" class="addr-check" value="${item.endereco}" onchange="validarLimite(this)" style="transform: scale(1.7); margin-right: 20px;">
                <span class="stop-badge">STOP ${item.stop}</span>
                <div class="info">
                    <strong>Nº ${item.numero}</strong><br>${item.endereco.split(',')[0]}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function validarLimite(checkbox) {
        const checkboxes = document.querySelectorAll('.addr-check:checked');
        if (checkboxes.length > 10) {
            checkbox.checked = false;
            alert("O Google Maps limita em 10 paradas por vez para garantir a melhor rota.");
        }
        selecionadosCount = document.querySelectorAll('.addr-check:checked').length;
        atualizarBotao();
    }

    function atualizarBotao() {
        document.getElementById('contador').innerText = `Selecionados: ${selecionadosCount} / 10`;
        document.getElementById('btnGerar').disabled = selecionadosCount === 0;
    }

    function gerarRota() {
        const checkboxes = document.querySelectorAll('.addr-check:checked');
        const enderecos = Array.from(checkboxes).map(cb => cb.value);

        // A 'origem' vazia faz o Maps usar o seu GPS ATUAL
        // Usamos o Google Maps Directions URL (mais moderno e preciso para rotas)
        const origin = "current+location";
        const destination = encodeURIComponent(enderecos[enderecos.length - 1]);
        const waypoints = enderecos.slice(0, -1).map(addr => encodeURIComponent(addr)).join('|');
        
        // Parâmetro 'optimize:true' faz o Google encontrar a melhor ordem entre as paradas
        const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&waypoint_optimization=true&travelmode=driving`;
        
        window.open(url, '_blank');
    }
</script>

</body>
</html>
