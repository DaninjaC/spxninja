<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja V22 - Google Real</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #111; padding: 10px; border-bottom: 2px solid #f1c40f; text-align: center; }
        .btn-arquivo { background: #222; color: #f1c40f; border: 1px dashed #f1c40f; padding: 8px; border-radius: 5px; width: 90%; max-width: 300px; cursor: pointer; font-size: 12px; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Lista de Entregas */
        #lista-container { width: 320px; overflow-y: auto; padding: 10px; background: #111; border-right: 1px solid #333; }
        .item-entrega { 
            background: #1a1a1a; margin-bottom: 8px; padding: 12px; border-radius: 8px; 
            border-left: 4px solid #f1c40f; cursor: pointer; transition: 0.2s;
        }
        .item-entrega:hover { background: #252525; }
        .item-entrega.active { background: #f1c40f; color: #000; font-weight: bold; }
        .stop-num { font-weight: bold; color: #f1c40f; margin-right: 10px; }
        .active .stop-num { color: #000; }

        /* Área do Mapa (Google) */
        #map-container { flex: 1; position: relative; background: #222; }
        iframe { width: 100%; height: 100%; border: none; }

        #status { font-size: 12px; color: #888; margin-bottom: 10px; text-align: center; }

        /* Ajuste para Celular */
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #lista-container { width: 100%; height: 35%; border-right: none; border-bottom: 2px solid #f1c40f; }
            #map-container { height: 65%; }
        }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:#f1c40f;">ROTAS NINJA V22</h3>
    <input type="file" id="fileInput" class="btn-arquivo" accept=".xlsx, .xls, .csv">
</div>

<div id="main-container">
    <div id="lista-container">
        <div id="status">Selecione a planilha de hoje</div>
        <div id="listaEntregas"></div>
    </div>
    
    <div id="map-container">
        <iframe id="googleMapsIframe" src="about:blank"></iframe>
    </div>
</div>

<script>
    const iframe = document.getElementById('googleMapsIframe');
    const status = document.getElementById('status');

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const planilha = wb.Sheets[wb.SheetNames[0]];
            const dados = XLSX.utils.sheet_to_json(planilha);
            
            // Ordena pelos Stops
            dados.sort((a, b) => (Number(a.Stop) || 0) - (Number(b.Stop) || 0));
            
            const container = document.getElementById('listaEntregas');
            container.innerHTML = "";
            
            dados.forEach((item) => {
                const endereco = item["Destination Address"] || item["Endereco"] || item["Endereço"] || "";
                if (!endereco) return;

                const div = document.createElement('div');
                div.className = 'item-entrega';
                div.innerHTML = `<span class="stop-num">${item.Stop || '?'}</span><span>${endereco}</span>`;
                
                div.onclick = () => carregarRotaNoGoogle(endereco, div);
                container.appendChild(div);
            });
            status.innerText = `${dados.length} entregas carregadas.`;
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function carregarRotaNoGoogle(destino, elemento) {
        // Marca o item como selecionado
        document.querySelectorAll('.item-entrega').forEach(el => el.classList.remove('active'));
        elemento.classList.add('active');

        // URL MESTRE DO GOOGLE:
        // saddr=My+Location (Origem: Minha Localização Atual)
        // daddr= (Destino: Endereço da planilha)
        // output=embed (Faz abrir dentro do seu aplicativo)
        const url = `https://maps.google.com/maps?saddr=My+Location&daddr=${encodeURIComponent(destino + ", São Caetano do Sul, SP")}&output=embed`;
        
        iframe.src = url;
        status.innerText = "Rota traçada no Google!";
    }
</script>

</body>
</html>
