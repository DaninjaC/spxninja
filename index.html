<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPX Ninja - Navegação por Ruas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; text-align: center; height: 100vh; display: flex; flex-direction: column; }
        
        /* Painel de Instrução (Igual GPS profissional) */
        #topo-navegacao { background: #007AFF; padding: 25px 10px; min-height: 180px; }
        #seta-manobra { font-size: 120px; line-height: 1; margin-bottom: 10px; display: block; }
        #metros-curva { font-size: 70px; font-weight: bold; display: block; }
        
        #nome-rua { background: #333; padding: 15px; font-size: 20px; color: #39FF14; text-transform: uppercase; border-bottom: 2px solid #444; }

        /* Painel de Destino Final */
        #painel-final { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; background: #111; }
        .label { color: #888; font-size: 14px; }
        #dist-total { font-size: 45px; font-weight: bold; margin: 5px 0; }
        #endereco-alvo { font-size: 16px; color: #ccc; padding: 0 20px; }

        #area-upload { padding: 30px; background: #000; }
        .btn { background: #39FF14; color: #000; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 20px; cursor: pointer; display: block; text-decoration: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="topo-navegacao">
        <span id="seta-manobra">---</span>
        <span id="metros-curva">0 m</span>
    </div>

    <div id="nome-rua">Aguardando Planilha...</div>

    <div id="painel-final">
        <div class="label">Distância Total</div>
        <div id="dist-total">---</div>
        <div id="endereco-alvo">Selecione o arquivo da SPX</div>
    </div>

    <div id="area-upload">
        <label class="btn" id="btnLabel">
            🚀 INICIAR ENTREGAS
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </label>
    </div>

    <script>
        let paradasExcel = [], passosDaRota = [], idxDestino = 0, idxPasso = 0;
        let minhaLat, minhaLon;

        const elSeta = document.getElementById('seta-manobra');
        const elMetrosCurva = document.getElementById('metros-curva');
        const elRua = document.getElementById('nome-rua');
        const elDistTotal = document.getElementById('dist-total');
        const elEndereco = document.getElementById('endereco-alvo');

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                paradasExcel = json.map(i => ({
                    lat: parseFloat(i.Latitude || i.latitude),
                    lon: parseFloat(i.Longitude || i.longitude),
                    addr: i["Destination Address"] || "Ponto de Entrega"
                })).filter(p => !isNaN(p.lat));

                if (paradasExcel.length > 0) {
                    document.getElementById('btnLabel').style.display = 'none';
                    iniciarMonitoramento();
                }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function iniciarMonitoramento() {
            navigator.geolocation.watchPosition(async pos => {
                const mudouMuito = !minhaLat || calcDist(minhaLat, minhaLon, pos.coords.latitude, pos.coords.longitude) > 5;
                minhaLat = pos.coords.latitude;
                minhaLon = pos.coords.longitude;
                
                if (mudouMuito && idxDestino < paradasExcel.length) {
                    if (passosDaRota.length === 0) await buscarNovaRota();
                    processarNavegação();
                }
            }, null, { enableHighAccuracy: true });
        }

        async function buscarNovaRota() {
            const destino = paradasExcel[idxDestino];
            elEndereco.innerText = destino.addr;

            // API OSRM com "steps=true" para pegar cada esquina
            const url = `https://router.project-osrm.org/route/v1/driving/${minhaLon},${minhaLat};${destino.lon},${destino.lat}?steps=true&overview=full&geometries=geojson&language=pt-BR`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.routes && data.routes[0]) {
                    passosDaRota = data.routes[0].legs[0].steps.map(s => ({
                        lat: s.maneuver.location[1],
                        lon: s.maneuver.location[0],
                        tipo: s.maneuver.type,
                        lado: s.maneuver.modifier,
                        rua: s.name || "Siga em frente"
                    }));
                    idxPasso = 0;
                }
            } catch (e) { console.error("Erro na rota"); }
        }

        function processarNavegação() {
            if (idxDestino >= paradasExcel.length || passosDaRota.length === 0) return;

            const proximoPasso = passosDaRota[idxPasso];
            const distCurva = calcDist(minhaLat, minhaLon, proximoPasso.lat, proximoPasso.lon);
            const distFinal = calcDist(minhaLat, minhaLon, paradasExcel[idxDestino].lat, paradasExcel[idxDestino].lon);

            // Atualiza Metros para a Curva
            elMetrosCurva.innerText = Math.round(distCurva) + " m";
            
            // Atualiza Distância Total
            elDistTotal.innerText = distFinal > 1000 ? (distFinal/1000).toFixed(1) + " km" : Math.round(distFinal) + " m";
            
            // Atualiza Nome da Rua
            elRua.innerText = proximoPasso.rua;

            // LÓGICA DA SETA (ESTILO GOOGLE MAPS)
            const m = proximoPasso.lado;
            if (m === "left" || m === "slight left" || m === "sharp left") {
                elSeta.innerText = "⬅️";
            } else if (m === "right" || m === "slight right" || m === "sharp right") {
                elSeta.innerText = "➡️";
            } else if (proximoPasso.tipo === "arrive") {
                elSeta.innerText = "📍";
            } else {
                elSeta.innerText = "⬆️";
            }

            // Se chegar na esquina (20 metros), pula para a próxima instrução
            if (distCurva < 20 && idxPasso < passosDaRota.length - 1) {
                idxPasso++;
            }

            // Se chegar no cliente (25 metros), pula para o próximo cliente do Excel
            if (distFinal < 25) {
                if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
                idxDestino++;
                passosDaRota = []; // Reseta para calcular a rota do próximo cliente
                buscarNovaRota();
            }
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Mantém a tela ligada
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
    </script>
</body>
</html>
