<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rotas Ninja - GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #menu-topo { background: #1a1a1a; padding: 10px; border-bottom: 2px solid #f1c40f; z-index: 1000; }
        #listaEntregas { flex: 1; overflow-y: auto; max-height: 30vh; background: #111; padding: 5px; display: block; }
        #map { flex: 3; width: 100%; position: relative; }
        .entrega-item { display: flex; align-items: center; background: #222; margin-bottom: 4px; padding: 12px; border-radius: 8px; font-size: 13px; border: 1px solid #333; }
        .stop-badge { background: #f1c40f; color: #000; padding: 3px 6px; border-radius: 4px; font-weight: bold; margin-right: 10px; }
        .painel-inferior { background: #1a1a1a; padding: 15px; border-top: 2px solid #333; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-calc { background: #333; color: #fff; border: 1px solid #f1c40f; }
        .btn-foco { background: #f1c40f; color: #000; }
        #status-txt { font-size: 11px; color: #f1c40f; text-align: center; margin-bottom: 5px; }
        .oculto { display: none !important; }
    </style>
</head>
<body>

<div id="menu-topo">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <strong style="color:#f1c40f">ROTAS NINJA GPS</strong>
        <button onclick="toggleLista()" style="background:none; border:1px solid #f1c40f; color:#f1c40f; padding:5px; border-radius:5px;">Minimizar Lista</button>
    </div>
    <input type="file" id="fileInput" style="margin-top:10px; width:100%">
</div>

<div id="status-txt">Aguardando GPS...</div>

<div id="listaEntregas"></div>

<div id="map"></div>

<div class="painel-inferior">
    <button class="btn btn-calc" onclick="gerarRotaInterna()">Calcular Rota</button>
    <button class="btn btn-foco" onclick="centralizarGPS()">📍 Centralizar</button>
</div>

<script>
    // Inicialização do Mapa
    var map = L.map('map', { zoomControl: false }).setView([-23.6192, -46.5627], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var markerGPS = L.circleMarker([0,0], {color: '#00ffff', radius: 10, fillOpacity: 0.9}).addTo(map);
    var markersParadas = [];
    var linhaRota = null;
    var minhaPosicao = null;
    var seguindoGPS = true;

    // Função para seguir o carro
    navigator.geolocation.watchPosition(pos => {
        minhaPosicao = [pos.coords.latitude, pos.coords.longitude];
        markerGPS.setLatLng(minhaPosicao);
        if (seguindoGPS) {
            map.panTo(minhaPosicao);
        }
        document.getElementById('status-txt').innerText = "GPS Ativo - Localização atualizada";
    }, null, { enableHighAccuracy: true });

    function centralizarGPS() {
        seguindoGPS = true;
        if (minhaPosicao) map.setView(minhaPosicao, 17);
    }

    function toggleLista() {
        document.getElementById('listaEntregas').classList.toggle('oculto');
    }

    // Leitura do Excel
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            const listaDiv = document.getElementById('listaEntregas');
            listaDiv.innerHTML = "";
            jsonData.forEach((item, index) => {
                let end = (item["Destination Address"] || item["Endereco"] || "").split('-')[0].trim();
                if(end) {
                    const div = document.createElement('div');
                    div.className = 'entrega-item';
                    div.innerHTML = `
                        <input type="checkbox" class="addr-check" value="${end}, São Caetano do Sul, SP" style="transform:scale(1.5); margin-right:15px;">
                        <span class="stop-badge">S${item["Stop"] || index}</span>
                        <div style="flex:1">${end}</div>
                    `;
                    listaDiv.appendChild(div);
                }
            });
            document.getElementById('status-txt').innerText = "Planilha carregada. Selecione as paradas.";
        };
        reader.readAsArrayBuffer(file);
    });

    async function gerarRotaInterna() {
        if (!minhaPosicao) return alert("Aguarde o sinal do GPS.");
        const selecionados = Array.from(document.querySelectorAll('.addr-check:checked'));
        if (selecionados.length === 0) return alert("Selecione os pacotes!");

        // Reset do Mapa
        markersParadas.forEach(m => map.removeLayer(m));
        if (linhaRota) map.removeLayer(linhaRota);
        markersParadas = [];

        let coordenadas = [minhaPosicao];
        const status = document.getElementById('status-txt');

        for (let i = 0; i < selecionados.length; i++) {
            status.innerText = `Buscando endereço ${i+1} de ${selecionados.length}...`;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(selecionados[i].value)}`);
            const data = await res.json();
            if (data && data[0]) {
                const pt = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                coordenadas.push(pt);
                let m = L.marker(pt).addTo(map).bindPopup(`Parada ${i+1}`);
                markersParadas.push(m);
            }
            await new Promise(r => setTimeout(r, 800)); // Delay necessário para o servidor
        }

        status.innerText = "Calculando rota de entrega...";
        
        // Monta a string de coordenadas (Longitude, Latitude para o OSRM)
        const coordsStr = coordenadas.map(c => `${c[1]},${c[0]}`).join(';');
        
        // Usamos o perfil 'route' para garantir que ele passe por todos os pontos na ordem
        const url = `https://router.project-osrm.org/route/v1/driving/${coordsStr}?overview=full&geometries=geojson`;

        try {
            const response = await fetch(url);
            const routeData = await response.json();
            if (routeData.routes && routeData.routes[0]) {
                const coords = routeData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                linhaRota = L.polyline(coords, {color: '#f1c40f', weight: 7, opacity: 0.8}).addTo(map);
                map.fitBounds(linhaRota.getBounds());
                status.innerText = "ROTA DEFINIDA. Siga a linha amarela.";
                
                // Minimiza a lista para dar espaço ao mapa
                document.getElementById('listaEntregas').classList.add('oculto');
                seguindoGPS = true;
            }
        } catch (e) {
            status.innerText = "Erro ao traçar rota.";
        }
    }
</script>
</body>
</html>
