<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPX Ninja - Navegador</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; text-align: center; height: 100vh; display: flex; flex-direction: column; }
        
        /* Painel Superior Estilo Waze */
        #painel-instrucao { background: #007AFF; padding: 20px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; }
        #icone-manobra { font-size: 80px; font-weight: bold; margin-bottom: 10px; }
        #distancia-regressiva { font-size: 60px; font-weight: bold; }
        
        #painel-rua { background: #1c1c1c; padding: 15px; font-size: 18px; color: #39FF14; font-weight: bold; }

        /* Painel Inferior (Destino Final) */
        #painel-inferior { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; background: #000; }
        .label { color: #888; font-size: 14px; text-transform: uppercase; }
        #distancia-final { font-size: 40px; font-weight: bold; color: #fff; }
        #info-destino { font-size: 16px; color: #aaa; padding: 10px 20px; }

        #controles { padding: 20px; background: #111; }
        .btn { background: #39FF14; color: #000; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; display: block; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="painel-instrucao">
        <div id="icone-manobra">--</div>
        <div id="distancia-regressiva">0 m</div>
    </div>

    <div id="painel-rua">Aguardando Rota...</div>

    <div id="painel-inferior">
        <div class="label">Chegada em</div>
        <div id="distancia-final">---</div>
        <div id="info-destino">Selecione sua planilha SPX</div>
    </div>

    <div id="controles">
        <label class="btn" id="btnLabel">
            📂 INICIAR ROTA XLSX
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </label>
    </div>

    <script>
        let destinos = [], passosRota = [], idxDestino = 0, idxPasso = 0;
        let minhaLat, minhaLon;

        const elIcone = document.getElementById('icone-manobra');
        const elDistRegressiva = document.getElementById('distancia-regressiva');
        const elRua = document.getElementById('painel-rua');
        const elDistFinal = document.getElementById('distancia-final');
        const elInfoDestino = document.getElementById('info-destino');

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                destinos = json.map(i => ({
                    lat: parseFloat(i.Latitude || i.latitude),
                    lon: parseFloat(i.Longitude || i.longitude),
                    addr: i["Destination Address"] || "Entrega"
                })).filter(p => !isNaN(p.lat));

                if (destinos.length > 0) {
                    document.getElementById('btnLabel').style.display = 'none';
                    ativarGPS();
                }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function ativarGPS() {
            navigator.geolocation.watchPosition(async pos => {
                const isPrimeira = !minhaLat;
                minhaLat = pos.coords.latitude;
                minhaLon = pos.coords.longitude;
                if (isPrimeira) await carregarNovoDestino();
                navegar();
            }, null, { enableHighAccuracy: true });
        }

        async function carregarNovoDestino() {
            if (idxDestino >= destinos.length) {
                elRua.innerText = "FIM DAS ENTREGAS";
                return;
            }
            const d = destinos[idxDestino];
            elInfoDestino.innerText = d.addr;

            // Busca rota detalhada no OSRM com instruções de manobra
            const url = `https://router.project-osrm.org/route/v1/driving/${minhaLon},${minhaLat};${d.lon},${d.lat}?steps=true&overview=full&geometries=geojson`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.routes && data.routes[0]) {
                passosRota = [];
                data.routes[0].legs[0].steps.forEach(step => {
                    passosRota.push({
                        lat: step.maneuver.location[1],
                        lon: step.maneuver.location[0],
                        instrucao: step.maneuver.type,
                        modifier: step.maneuver.modifier,
                        rua: step.name || "Siga em frente"
                    });
                });
                idxPasso = 0;
            }
        }

        function navegar() {
            if (idxDestino >= destinos.length || !passosRota[idxPasso]) return;

            const passo = passosRota[idxPasso];
            const distParaCurva = calcularDistancia(minhaLat, minhaLon, passo.lat, passo.lon);
            const dFinal = calcularDistancia(minhaLat, minhaLon, destinos[idxDestino].lat, destinos[idxDestino].lon);

            // 1. Atualiza Distâncias
            elDistRegressiva.innerText = Math.round(distParaCurva) + " m";
            elDistFinal.innerText = dFinal > 1000 ? (dFinal/1000).toFixed(1) + " km" : Math.round(dFinal) + " m";
            elRua.innerText = passo.rua;

            // 2. Define Ícone (Estilo Waze)
            if (passo.modifier === "left" || passo.modifier === "slight left") elIcone.innerText = "⬅️";
            else if (passo.modifier === "right" || passo.modifier === "slight right") elIcone.innerText = "➡️";
            else if (passo.instrucao === "arrive") elIcone.innerText = "📍";
            else elIcone.innerText = "⬆️";

            // 3. Lógica de Mudança de Passo
            if (distParaCurva < 20 && idxPasso < passosRota.length - 1) {
                idxPasso++;
            }

            // 4. Lógica de Chegada no Cliente
            if (dFinal < 25) {
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                idxDestino++;
                carregarNovoDestino();
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
    </script>
</body>
</html>
