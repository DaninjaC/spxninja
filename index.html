<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja V19 - Fluxo Real</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #0b0e11; color: #e9eaeb; padding: 15px; }
        .card { background: #15191c; border-radius: 12px; padding: 20px; border: 1px solid #2b2f36; margin-bottom: 20px; }
        h2 { color: #f1c40f; text-align: center; margin-top: 0; }
        input[type="file"] { width: 100%; padding: 15px; background: #2b2f36; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .entrega-item { display: flex; align-items: center; background: #1e2329; padding: 15px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid #f1c40f; }
        .stop-info { flex: 1; margin-left: 10px; }
        .stop-number { font-size: 20px; font-weight: bold; color: #f1c40f; min-width: 35px; }
        .btn-go { background: #f1c40f; color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-check { width: 25px; height: 25px; cursor: pointer; }
        #listaStatus { font-size: 12px; color: #848e9c; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>ROTAS NINJA V19</h2>
    <input type="file" id="fileInput" accept=".xlsx, .xls">
</div>

<div id="listaStatus">Aguardando planilha de São Caetano...</div>
<div id="containerEntregas"></div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet);
            
            exibirEntregas(jsonData);
        };
        reader.readAsArrayBuffer(file);
    });

    function exibirEntregas(dados) {
        const container = document.getElementById('containerEntregas');
        const status = document.getElementById('listaStatus');
        container.innerHTML = "";
        
        if (dados.length === 0) {
            status.innerText = "Nenhuma entrega encontrada.";
            return;
        }

        // Ordenação por Stop
        dados.sort((a, b) => (a.Stop || 0) - (b.Stop || 0));

        dados.forEach((item) => {
            const enderecoOriginal = item["Destination Address"] || item["Endereco"] || "";
            if (!enderecoOriginal) return;

            // Limpeza Ninja do endereço para o Google Maps
            const enderecoLimpo = enderecoOriginal.split('-')[0].split('(')[0].trim() + ", São Caetano do Sul, SP";
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(enderecoLimpo)}&travelmode=driving`;

            const div = document.createElement('div');
            div.className = 'entrega-item';
            div.innerHTML = `
                <div class="stop-number">${item.Stop || '?'}</div>
                <div class="stop-info">
                    <div style="font-size: 14px; font-weight: bold;">${enderecoOriginal.split(',')[0]}</div>
                    <div style="font-size: 12px; color: #848e9c;">${item.Nome || 'Cliente'}</div>
                </div>
                <a href="${mapsUrl}" target="_blank" class="btn-go">NAV</a>
            `;
            container.appendChild(div);
        });

        status.innerText = `${dados.length} entregas carregadas em ordem linear.`;
    }
</script>

</body>
</html>
