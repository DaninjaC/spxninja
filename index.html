<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPX Ninja - Navegador Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon: #39FF14; --blue: #007AFF; --yellow: #FFCC00; --bg: #000; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* PAINEL TOPO - DESIGN AJUSTADO */
        #painel-topo { background: var(--blue); display: grid; grid-template-columns: 120px 1fr 80px; align-items: center; min-height: 140px; z-index: 1001; border-bottom: 2px solid #222; }
        .modo-confirmacao { background: var(--yellow) !important; color: #000 !important; }
        
        #col-seta { text-align: center; border-right: 1px solid rgba(255,255,255,0.2); height: 100%; display: flex; flex-direction: column; justify-content: center; }
        #seta-instrucao { font-size: 80px; line-height: 1; display: block; }
        #metros-curva { font-size: 24px; font-weight: bold; display: block; }

        #col-info { padding: 0 10px; text-align: left; }
        #stop-badge { background: #000; color: var(--neon); padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 14px; margin-bottom: 5px; display: inline-block; }
        #rua-destino-topo { font-size: 18px; font-weight: bold; text-transform: uppercase; display: block; }

        #col-total { text-align: center; font-size: 14px; }
        #distancia-total-km { font-size: 20px; font-weight: bold; display: block; color: var(--neon); }

        /* MAPA COM ROTAÇÃO */
        #map-container { flex: 1; position: relative; overflow: hidden; background: #111; }
        #map { width: 100%; height: 100%; transition: transform 0.5s ease-out; }

        /* PAINEL RODAPÉ - DUAS COLUNAS */
        #painel-rodape { background: #111; display: grid; grid-template-columns: 1fr 1fr; min-height: 150px; border-top: 2px solid #444; z-index: 1001; }
        .col-rodape { padding: 10px; overflow-y: auto; font-size: 14px; text-align: left; }
        .col-rodape:first-child { border-right: 1px solid #333; }
        
        .titulo-rodape { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .item-lista { margin-bottom: 4px; line-height: 1.3; }
        b { color: var(--neon); }

        /* MODAL INICIAL */
        #modal-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #lista-stops { flex: 1; overflow-y: auto; margin-top: 20px; }
        .stop-row { padding: 15px; border-bottom: 1px solid #333; font-size: 16px; }

        #painel-acoes { display: none; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: var(--yellow); }
        .btn-status { padding: 20px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; color: #fff; text-transform: uppercase; }

        .leaflet-tile-container { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

    <div id="modal-inicio">
        <h2 style="color: var(--neon)">Selecione o Início:</h2>
        <div id="lista-stops"></div>
    </div>

    <div id="painel-topo">
        <div id="col-seta">
            <span id="seta-instrucao">⬆️</span>
            <span id="metros-curva">0m</span>
        </div>
        <div id="col-info">
            <div id="stop-badge">STOP --</div>
            <span id="rua-destino-topo">Aguardando...</span>
        </div>
        <div id="col-total">
            KM TOTAL
            <span id="distancia-total-km">0.0</span>
        </div>
    </div>

    <div id="painel-acoes">
        <button class="btn-status" style="background:#28a745" onclick="finalizarParada('concluido')">ENTREGUE</button>
        <button class="btn-status" style="background:#dc3545" onclick="finalizarParada('pendente')">PROBLEMA</button>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <div id="painel-rodape">
        <div class="col-rodape">
            <div class="titulo-rodape">📦 Pacotes da Parada</div>
            <div id="lista-pacotes">Aguardando...</div>
        </div>
        <div class="col-rodape">
            <div class="titulo-rodape">📍 Próximos (200m)</div>
            <div id="lista-proximidades">Nenhum próximo</div>
        </div>
    </div>

    <div id="controles" style="padding: 10px; background: #000;">
        <label style="background:var(--neon); color:#000; padding:15px; border-radius:10px; font-weight:bold; display:block; text-align:center;">
            📂 CARREGAR PLANILHA
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display:none">
        </label>
    </div>

    <script>
        let rotaSpx = [], passosNav = [], idxDestino = 0, idxPasso = 0;
        let minhaLat, minhaLon, mapa, markerUser, markerDest, polylineRota;
        let camadaFundo = L.layerGroup(), aguardandoConf = false, wakeLock = null;
        let ultimaLat, ultimaLon, heading = 0;

        window.onload = function() {
            mapa = L.map('map', { zoomControl: false, attributionControl: false, rotate: true }).setView([-23.61, -46.57], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            camadaFundo.addTo(mapa);
            setTimeout(() => { mapa.invalidateSize(); }, 500);
        };

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const stopsMap = {};
                raw.filter(i => i.Stop || i.Parada).forEach(i => {
                    const sNum = i.Stop || i.Parada;
                    if (!stopsMap[sNum]) {
                        stopsMap[sNum] = {
                            stop: sNum,
                            lat: parseFloat(String(i.Latitude).replace(',', '.')),
                            lon: parseFloat(String(i.Longitude).replace(',', '.')),
                            rua: i["Destination Address"].split(',')[0],
                            ends: []
                        };
                    }
                    stopsMap[sNum].ends.push(i["Destination Address"]);
                });

                rotaSpx = Object.values(stopsMap).sort((a, b) => a.stop - b.stop).map(s => {
                    const contagem = {};
                    s.ends.forEach(e => {
                        const num = e.split(',')[1] ? e.split(',')[1].trim() : "S/N";
                        contagem[num] = (contagem[num] || 0) + 1;
                    });
                    const lista = Object.entries(contagem).map(([n, q]) => `<div class="item-lista"><b>${q}</b> pac no nº <b>${n}</b></div>`).join('');
                    return { ...s, resumo: lista, totalPac: s.ends.length, status: 'neutro' };
                });

                if (rotaSpx.length > 0) {
                    const modal = document.getElementById('modal-inicio');
                    const lista = document.getElementById('lista-stops');
                    lista.innerHTML = "";
                    modal.style.display = "flex";
                    rotaSpx.forEach((p, index) => {
                        const div = document.createElement('div');
                        div.className = "stop-row";
                        div.innerHTML = `<b>${p.stop}</b> - ${p.rua}`;
                        div.onclick = () => {
                            idxDestino = index;
                            modal.style.display = "none";
                            document.querySelector('#controles').style.display = 'none';
                            iniciarGPS();
                        };
                        lista.appendChild(div);
                    });
                }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function iniciarGPS() {
            requestWakeLock();
            navigator.geolocation.watchPosition(async pos => {
                if (ultimaLat) {
                    // CALCULA ROTAÇÃO DO MAPA (HEADING)
                    heading = bear(ultimaLat, ultimaLon, pos.coords.latitude, pos.coords.longitude);
                    document.getElementById('map').style.transform = `rotate(${-heading}deg)`;
                }
                ultimaLat = minhaLat = pos.coords.latitude;
                ultimaLon = minhaLon = pos.coords.longitude;

                if (!markerUser) markerUser = L.circleMarker([minhaLat, minhaLon], { color: '#fff', fillColor: '#007AFF', fillOpacity: 1, radius: 10, weight: 3, zIndexOffset: 1000 }).addTo(mapa);
                else markerUser.setLatLng([minhaLat, minhaLon]);

                mapa.setView([minhaLat, minhaLon], 19);

                // RADAR DE PROXIMIDADE (200m)
                atualizarRadar();

                if (idxDestino < rotaSpx.length && !aguardandoConf) {
                    if (passosNav.length === 0 || dist(minhaLat, minhaLon, passosNav[idxPasso]?.lat, passosNav[idxPasso]?.lon) > 40) await calcularRota();
                    navegar();
                }
            }, null, { enableHighAccuracy: true });
        }

        async function calcularRota() {
            const d = rotaSpx[idxDestino];
            document.getElementById('stop-badge').innerText = "STOP " + d.stop;
            document.getElementById('rua-destino-topo').innerText = d.rua;
            document.getElementById('lista-pacotes').innerHTML = d.resumo;

            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${minhaLon},${minhaLat};${d.lon},${d.lat}?steps=true&overview=full&geometries=geojson`);
            const data = await res.json();
            if (data.routes && data.routes[0]) {
                const r = data.routes[0];
                passosNav = r.legs[0].steps.map(s => ({ lat: s.maneuver.location[1], lon: s.maneuver.location[0], m: s.maneuver.modifier }));
                idxPasso = 0;
                document.getElementById('distancia-total-km').innerText = (r.distance / 1000).toFixed(1) + " km";
                if (polylineRota) mapa.removeLayer(polylineRota);
                polylineRota = L.polyline(r.geometry.coordinates.map(c => [c[1], c[0]]), { color: '#007AFF', weight: 8, opacity: 0.8 }).addTo(mapa);
            }
        }

        function navegar() {
            const dFinal = dist(minhaLat, minhaLon, rotaSpx[idxDestino].lat, rotaSpx[idxDestino].lon);
            if (dFinal < 70) {
                aguardandoConf = true;
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
                document.getElementById('nav-ui').style.display = 'none';
                document.getElementById('painel-acoes').style.display = 'grid';
                document.getElementById('painel-topo').classList.add('modo-confirmacao');
                return;
            }

            const p = passosNav[idxPasso];
            if (!p) return;
            const dCurva = dist(minhaLat, minhaLon, p.lat, p.lon);
            document.getElementById('metros-curva').innerText = Math.round(dCurva) + "m";
            
            if (p.m && p.m.includes("left")) document.getElementById('seta-instrucao').innerText = "⬅️";
            else if (p.m && p.m.includes("right")) document.getElementById('seta-instrucao').innerText = "➡️";
            else document.getElementById('seta-instrucao').innerText = "⬆️";

            if (dCurva < 20 && idxPasso < passosNav.length - 1) idxPasso++;
        }

        function atualizarRadar() {
            const proximos = rotaSpx.filter((p, i) => i !== idxDestino && p.status === 'neutro' && dist(minhaLat, minhaLon, p.lat, p.lon) < 200);
            const container = document.getElementById('lista-proximidades');
            if (proximos.length > 0) {
                container.innerHTML = proximos.map(p => `<div class="item-lista"><b>STOP ${p.stop}</b> (${Math.round(dist(minhaLat, minhaLon, p.lat, p.lon))}m)</div>`).join('');
            } else { container.innerText = "Nenhum próximo"; }
        }

        function finalizarParada(st) {
            aguardandoConf = false;
            requestWakeLock();
            idxDestino++; passosNav = [];
            document.getElementById('nav-ui').style.display = 'block';
            document.getElementById('painel-acoes').style.display = 'none';
            document.getElementById('painel-topo').classList.remove('modo-confirmacao');
            if (idxDestino < rotaSpx.length) calcularRota();
        }

        function dist(la1, lo1, la2, lo2) {
            const R = 6371000;
            const dLat = (la2-la1) * Math.PI/180;
            const dLon = (lo2-lo1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function bear(la1, lo1, la2, lo2) {
            const y = Math.sin((lo2-lo1)*Math.PI/180)*Math.cos(la2*Math.PI/180);
            const x = Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos((lo2-lo1)*Math.PI/180);
            return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
