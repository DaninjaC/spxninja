<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Ninja V21 - Express</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        #header { padding: 10px; background: #1a1a1a; border-bottom: 2px solid #f1c40f; text-align: center; }
        #lista-container { flex: 1; overflow-y: auto; padding: 10px; }
        .item-rota { 
            display: flex; align-items: center; background: #222; 
            margin-bottom: 8px; padding: 15px; border-radius: 10px; 
            border: 1px solid #333; cursor: pointer;
        }
        .stop-n { background: #f1c40f; color: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-right: 15px; }
        
        #map-frame-container { 
            display: none; flex: 1; width: 100%; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .btn-voltar {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background: #f1c40f; color: #000; border: none; padding: 12px 25px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .oculto { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <strong style="color:#f1c40f">ROTAS NINJA V21</strong>
    <input type="file" id="fileInput" style="margin-top:10px; width:90%">
</div>

<div id="lista-container">
    <p style="text-align:center; color:#666;">Selecione a planilha para listar as entregas.</p>
</div>

<div id="map-frame-container">
    <button class="btn-voltar" onclick="fecharMapa()">VOLTAR</button>
    <iframe id="googleMapsFrame" allow="geolocation" src=""></iframe>
</div>

<script>
    let dadosPlanilha = [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const wb = XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
            dadosPlanilha = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            renderizarLista();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function renderizarLista() {
        const container = document.getElementById('lista-container');
        container.innerHTML = "";
        dadosPlanilha.sort((a, b) => (a.Stop || 0) - (b.Stop || 0));

        dadosPlanilha.forEach((item) => {
            const end = item["Destination Address"] || item["Endereco"] || "";
            if (!end) return;

            const div = document.createElement('div');
            div.className = 'item-rota';
            div.onclick = () => iniciarNavegacao(end);
            div.innerHTML = `
                <div class="stop-n">${item.Stop || '?'}</div>
                <div style="flex:1">
                    <div style="font-weight:bold">${end.split(',')[0]}</div>
                    <div style="font-size:12px; color:#aaa">${item.CEP || ''}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function iniciarNavegacao(endereco) {
        const lista = document.getElementById('lista-container');
        const mapaContainer = document.getElementById('map-frame-container');
        const frame = document.getElementById('googleMapsFrame');

        const destino = encodeURIComponent(endereco.split('-')[0].split('(')[0].trim() + ", São Caetano do Sul, SP");
        
        // URL NINJA: Força Origem no seu GPS, Destino na Planilha e modo Direção de Carro
        // O parâmetro 'saddr=My+Location' é o segredo para ele não pegar o centro da cidade
        const url = `https://maps.google.com/maps?saddr=My+Location&daddr=${destino}&directionsmode=driving&output=embed`;

        frame.src = url;
        lista.classList.add('oculto');
        mapaContainer.style.display = 'block';
    }

    function fecharMapa() {
        document.getElementById('lista-container').classList.remove('oculto');
        document.getElementById('map-frame-container').style.display = 'none';
        document.getElementById('googleMapsFrame').src = "";
    }
</script>

</body>
</html>
