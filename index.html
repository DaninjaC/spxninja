<script>
let rotaSpx = [], passosNavegacao = [], idxDestino = 0, idxPasso = 0;
let minhaLat, minhaLon, mapa, markerUser, markerDest, polylineRota;
let camadaFundo = L.layerGroup(), aguardandoConfirmacao = false, ultimaLatReq, ultimaLonReq;
let wakeLock = null;

// 🔊 CONTROLE DE VOZ
let falouCurva = false;
let falouDestino = false;

// --- FUNÇÃO DE FALA ---
function falar(texto) {
    if ('speechSynthesis' in window) {
        const utter = new SpeechSynthesisUtterance(texto);
        utter.lang = 'pt-BR';
        utter.rate = 1;
        window.speechSynthesis.cancel(); // evita sobreposição
        window.speechSynthesis.speak(utter);
    }
}

// --- WAKE LOCK ---
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {}
}

function releaseWakeLock() {
    if (wakeLock !== null) {
        wakeLock.release();
        wakeLock = null;
    }
}

window.onload = function() {
    mapa = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.61, -46.57], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
    camadaFundo.addTo(mapa);
};

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    requestWakeLock();

    reader.onload = function(evt) {
        const wb = XLSX.read(evt.target.result, { type: 'binary' });
        const dataRaw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

        const json = dataRaw.map(row => {
            const normalized = {};
            for (let key in row) normalized[key.trim().toLowerCase()] = row[key];
            return normalized;
        });

        const contagem = {};
        json.forEach(i => { 
            let s = i.stop || i.parada || i.sequence;
            if(s && !isNaN(s)) contagem[s] = (contagem[s] || 0) + 1; 
        });

        rotaSpx = json.map(i => ({
            lat: parseFloat(String(i.latitude || i.lat).replace(',', '.')),
            lon: parseFloat(String(i.longitude || i.lon || i.lng).replace(',', '.')),
            addr: i["destination address"] || i.endereco || "",
            stop: i.stop || i.parada || i.sequence,
            pacotes: contagem[i.stop || i.parada || i.sequence] || 1,
            status: 'neutro',
            marker: null
        })).filter(i => !isNaN(i.lat));

        desenharStopsFundo();
        iniciarGPS();
    };

    reader.readAsBinaryString(e.target.files[0]);
});

function desenharStopsFundo() {
    camadaFundo.clearLayers();
    rotaSpx.forEach((p) => {
        p.marker = L.circleMarker([p.lat, p.lon], { radius: 6, color: '#666', fillColor: '#333', fillOpacity: 1 })
        .bindTooltip("Stop " + p.stop, { permanent: true })
        .addTo(camadaFundo);
    });
}

function iniciarGPS() {
    navigator.geolocation.watchPosition(async pos => {
        minhaLat = pos.coords.latitude; minhaLon = pos.coords.longitude;

        if (!markerUser) {
            markerUser = L.circleMarker([minhaLat, minhaLon]).addTo(mapa);
        } else {
            markerUser.setLatLng([minhaLat, minhaLon]);
        }

        if (idxDestino < rotaSpx.length && !aguardandoConfirmacao) {
            if (passosNavegacao.length === 0) {
                await calcularRota();
            }
            navegar();
        }

    }, null, { enableHighAccuracy: true });
}

async function calcularRota() {
    falouCurva = false;
    falouDestino = false;

    const d = rotaSpx[idxDestino];

    const url = `https://router.project-osrm.org/route/v1/driving/${minhaLon},${minhaLat};${d.lon},${d.lat}?steps=true&overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();

    const route = data.routes[0];
    passosNavegacao = route.legs[0].steps.map(s => ({
        lat: s.maneuver.location[1],
        lon: s.maneuver.location[0],
        manobra: s.maneuver.modifier
    }));

    idxPasso = 0;
}

function navegar() {
    const dFinal = dist(minhaLat, minhaLon, rotaSpx[idxDestino].lat, rotaSpx[idxDestino].lon);

    // 🔊 AVISO DE DESTINO (100m)
    if (dFinal < 100 && !falouDestino) {
        falar("Você está chegando ao destino");
        falouDestino = true;
    }

    const passo = passosNavegacao[idxPasso];
    if (!passo) return;

    const dCurva = dist(minhaLat, minhaLon, passo.lat, passo.lon);

    // 🔊 AVISO DE CURVA (50m)
    if (dCurva < 50 && !falouCurva) {
        if (passo.manobra && passo.manobra.includes("left")) {
            falar("Vire à esquerda");
        } else if (passo.manobra && passo.manobra.includes("right")) {
            falar("Vire à direita");
        }
        falouCurva = true;
    }

    if (dCurva < 20) {
        idxPasso++;
        falouCurva = false; // reset para próxima curva
    }
}

function dist(la1, lo1, la2, lo2) {
    const R = 6371000;
    const dLat = (la2-la1) * Math.PI/180;
    const dLon = (lo2-lo1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
</script>
